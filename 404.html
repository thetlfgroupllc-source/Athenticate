<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — ATHenticate</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg-deep:#020B18;--cyan:#00C8FF;--teal:#0AEFFF;--white:#F0F8FF;--grey:#7A9BB5;--border:rgba(0,200,255,0.14); }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--bg-deep);color:var(--white);font-family:'Barlow',sans-serif;overflow-x:hidden;display:flex;flex-direction:column;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,200,255,0.06) 0%,transparent 70%);}
  .circuit-bg{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.05;background-image:linear-gradient(var(--cyan) 1px,transparent 1px),linear-gradient(90deg,var(--cyan) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(ellipse at 50% 0%,black 0%,transparent 70%);}
  nav{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 3rem;background:rgba(2,11,24,0.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);}
  .nav-logo{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:900;letter-spacing:0.08em;color:var(--white);text-decoration:none;}
  .nav-logo span{color:var(--cyan);}
  .main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4rem 2rem;}
  .error-code{font-family:'Barlow Condensed',sans-serif;font-size:clamp(6rem,20vw,12rem);font-weight:900;line-height:0.9;color:var(--cyan);opacity:0.15;letter-spacing:-0.02em;margin-bottom:0;}
  .error-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2rem,6vw,3.5rem);font-weight:900;text-transform:uppercase;line-height:1;margin-top:-1rem;margin-bottom:1rem;}
  .error-title span{color:var(--cyan);}
  .error-desc{font-size:1rem;color:var(--grey);line-height:1.7;max-width:460px;margin:0 auto 2.5rem;}
  .error-actions{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;}
  .btn-primary{background:linear-gradient(135deg,var(--cyan),var(--teal));color:var(--bg-deep);border:none;padding:0.9rem 2.2rem;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);transition:all 0.25s;box-shadow:0 6px 24px rgba(0,200,255,0.25);text-decoration:none;display:inline-block;}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,200,255,0.45);}
  .btn-outline{background:transparent;border:1.5px solid rgba(0,200,255,0.3);color:var(--cyan);padding:0.85rem 2rem;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:all 0.2s;text-decoration:none;display:inline-block;}
  .btn-outline:hover{background:rgba(0,200,255,0.08);border-color:var(--cyan);}
  footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:1.5rem 3rem;display:flex;justify-content:space-between;align-items:center;}
  .footer-logo{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900;letter-spacing:0.08em;}
  .footer-logo span{color:var(--cyan);}
  .footer-tagline{font-size:0.68rem;color:var(--grey);text-transform:uppercase;letter-spacing:0.14em;}
  .footer-links{display:flex;gap:1.5rem;list-style:none;}
  .footer-links a{font-size:0.75rem;color:var(--grey);text-decoration:none;text-transform:uppercase;letter-spacing:0.08em;transition:color 0.2s;}
  .footer-links a:hover{color:var(--cyan);}
  @media(max-width:600px){
    nav{padding:1rem 1.5rem;}
    .error-code{font-size:clamp(5rem,25vw,8rem);}
    .error-actions{flex-direction:column;align-items:stretch;}
    .btn-primary,.btn-outline{text-align:center;}
    footer{flex-direction:column;gap:1rem;text-align:center;padding:1.5rem;}
    .footer-links{justify-content:center;flex-wrap:wrap;gap:1rem;}
  }
</style>
</head>
<body>
<div class="circuit-bg"></div>

<nav>
  <a class="nav-logo" href="./index.html"><span>ATH</span>enticate</a>
</nav>

<div class="main">
  <div class="error-code">404</div>
  <h1 class="error-title">Page Not<br><span>Found.</span></h1>
  <p class="error-desc">The page you're looking for doesn't exist or was moved. Head back to the platform and pick up where you left off.</p>
  <div class="error-actions">
    <a href="./index.html" class="btn-primary">Back to ATHenticate</a>
    <a href="./submit-review.html" class="btn-outline">Rate Your Agent</a>
  </div>
</div>

<footer>
  <div>
    <div class="footer-logo"><span>ATH</span>enticate</div>
    <div class="footer-tagline">Players Protecting Players</div>
  </div>
  <ul class="footer-links">
    <li><a href="./index.html">Home</a></li>
    <li><a href="./submit-review.html">Submit Review</a></li>
    <li><a href="./faq.html">FAQ</a></li>
    <li><a href="mailto:contact@athenticate.co">Contact</a></li>
  </ul>
</footer>

</body>
</html>
